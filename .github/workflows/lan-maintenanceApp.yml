name: Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # -------------------------
          # Windows
          # -------------------------
          - os: windows-latest
            tauri_args: ""
            rust_targets: ""

          # -------------------------
          # macOS (Universal)
          # -------------------------
          - os: macos-latest
            tauri_args: "--target universal-apple-darwin"
            rust_targets: "x86_64-apple-darwin aarch64-apple-darwin"

          # -------------------------
          # Android
          # -------------------------
          - os: ubuntu-22.04
            tauri_args: "android build"
            rust_targets: "aarch64-linux-android"

    runs-on: ${{ matrix.os }}

    steps:
      # -------------------------------------------------
      # Checkout
      # -------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # Node Setup
      # -------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Frontend Dependencies
        run: npm ci
        
      # -------------------------------------------------
      # Build Frontend (VERY IMPORTANT)
      # -------------------------------------------------
      - name: Build Frontend
        run: npm run build

      # -------------------------------------------------
      # Rust Setup
      # -------------------------------------------------
      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # -------------------------------------------------
      # Android Setup (Ubuntu Only)
      # -------------------------------------------------
      - name: Setup Java 17
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        if: matrix.os == 'ubuntu-22.04'
        uses: android-actions/setup-android@v3

      # -------------------------------------------------
      # Linux Dependencies (Desktop Only)
      # -------------------------------------------------
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-22.04' && matrix.tauri_args != 'android build'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      # -------------------------------------------------
      # Setup Go
      # -------------------------------------------------
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      # -------------------------------------------------
      # Build Go Sidecars (Desktop)
      # -------------------------------------------------
      - name: Build Go Sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cd src-go
          GOOS=windows GOARCH=amd64 go build -o ../src-tauri/binaries/network-engine-x86_64-pc-windows-msvc.exe

      - name: Build Go Sidecars (macOS Universal)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p src-tauri/binaries
          cd src-go
          # Intel
          GOOS=darwin GOARCH=amd64 go build -o ../src-tauri/binaries/network-engine-x86_64-apple-darwin
          # Apple Silicon
          GOOS=darwin GOARCH=arm64 go build -o ../src-tauri/binaries/network-engine-aarch64-apple-darwin
          # MERGE THEM into a Universal Binary
          lipo -create \
            ../src-tauri/binaries/network-engine-x86_64-apple-darwin \
            ../src-tauri/binaries/network-engine-aarch64-apple-darwin \
            -output ../src-tauri/binaries/network-engine-universal-apple-darwin

      # -------------------------------------------------
      # Build Go for Android (If Needed)
      # -------------------------------------------------
      - name: Build Go Sidecar (Android ARM64)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/binaries
          cd src-go
          GOOS=android GOARCH=arm64 go build -o ../src-tauri/binaries/network-engine-aarch64-linux-android

      # -------------------------------------------------
      # Tauri Build + GitHub Release
      # -------------------------------------------------
      - name: Build & Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tagName: v${{ github.run_number }}
          releaseName: "LAN Maintainer Enterprise Build v${{ github.run_number }}"
          releaseBody: "Automated Enterprise Release"
          args: ${{ matrix.tauri_args }}